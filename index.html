function formatDateLT(ds) {
  if (!ds) return '—';
  try { const d = new Date(ds+'T00:00:00');
    return `${d.getDate()} ${LT_MONTHS[d.getMonth()]} ${d.getFullYear()} m.`; }
  catch { return ds; }
}
function formatDateShort(ds) {
  if (!ds) return '—';

}

/* ── Community Photos storage (Supabase) ────────────────────────── */
async function loadPhotos() {
  try {
    const { data } = await supa.from('photos').select('*')
      .in('status', ['published', 'approved'])
      .order('created_at', { ascending: false });
    /* Supabase column is image_data; gallery uses imageData like admin */
    return (data || []).map(r => ({ ...r, imageData: r.image_data || r.imageData }));
  } catch { return []; }
}
async function savePhoto(photo) {
  await supa.from('photos').insert({
    id: String(photo.id || Date.now()),
    image_data: photo.imageData || '',
    caption: photo.caption || '',
    status: 'pending',
  });
}

/** Resize + compress an image File to JPEG base64 (max 960px wide). */
function compressImage(file, callback) {
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    URL.revokeObjectURL(url);
    const MAX = 960;
    let w = img.width, h = img.height;
    if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    callback(canvas.toDataURL('image/jpeg', 0.78));
  };
  img.src = url;
}

/* ══════════════════════════════════════════════════════════════════
   § 2  CANVAS BACKGROUND REMOVAL
   Flood-fills from the 4 corners, erasing white/near-white pixels.
   Stops at the dark crust, so the bread crumb stays intact.
══════════════════════════════════════════════════════════════════ */
/* Flood-fill from corners — used for bread (keeps crumb texture intact) */
function removeWhiteBackground(src, onDone) {
  const img = new Image();
  img.onerror = () => { try { onDone(src); } catch (_) {} };
  img.onload = () => {
    const W = img.naturalWidth, H = img.naturalHeight;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, W, H);
    const d = data.data;
    const visited = new Uint8Array(W * H);
    const stack = [0, W-1, (H-1)*W, W*H-1];
    while (stack.length) {
      const p = stack.pop();
      if (p < 0 || p >= W*H || visited[p]) continue;
      visited[p] = 1;
      const i = p * 4;
      if (d[i]<230 || d[i+1]<230 || d[i+2]<230) continue;
      d[i+3] = 0;
      const x = p%W, y = (p/W)|0;
      if (x>0)    stack.push(p-1);
      if (x<W-1)  stack.push(p+1);
      if (y>0)    stack.push(p-W);
      if (y<H-1)  stack.push(p+W);
    }
    ctx.putImageData(data, 0, 0);
    onDone(canvas.toDataURL('image/png'));
  };
  img.src = src;
}

/* Global threshold — used for logos: every near-white pixel becomes transparent */
function removeWhiteBackgroundGlobal(src, onDone) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onerror = () => { try { onDone(src); } catch (_) {} };
  img.onload = () => {
    const W = img.naturalWidth, H = img.naturalHeight;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, W, H);
    const d = data.data;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const brightness = (r + g + b) / 3;
      // Any pixel brighter than 180 on all channels → fade to transparent
      if (r > 180 && g > 180 && b > 180) {
        // Smooth falloff: pixels near 255 → 0 alpha, near 180 → full alpha
        const t = (brightness - 180) / 75; // 0..1 range
        d[i+3] = Math.round((1 - t) * d[i+3]);
      }
    }
    ctx.putImageData(data, 0, 0);
    onDone(canvas.toDataURL('image/png'));
  };
  img.src = src;
}

function Btn({ children, onClick, variant='primary', size='md', type='button',
               disabled=false, href, target, className='' }) {
  const base = 'inline-flex items-center justify-center font-mono font-bold '+
    'tracking-[0.12em] uppercase transition-all cursor-pointer '+
    'disabled:opacity-40 disabled:cursor-not-allowed';
  const sizes = { sm:'text-[10px] px-3 py-1.5', md:'text-[11px] px-4 py-2.5',
                  lg:'text-[12px] px-6 py-3' };
  const variants = {
    primary:   'bg-black text-white border-2 border-black hover:bg-gray-800',
    secondary: 'bg-transparent text-black border-2 border-black hover:bg-black hover:text-white',
    danger:    'bg-red-600 text-white border-2 border-red-600 hover:bg-red-700',
    success:   'bg-green-700 text-white border-2 border-green-700 hover:bg-green-800',
    ghost:     'bg-transparent text-gray-500 border-2 border-gray-300 hover:border-black hover:text-black',
    accent:    'text-white border-2',
  };
  const cls = `${base} ${sizes[size]} ${variants[variant]} ${className}`;
  if (href) return <a href={href} target={target} rel="noopener noreferrer" className={cls}>{children}</a>;
  return <button type={type} onClick={onClick} disabled={disabled} className={cls}>{children}</button>;
}

function StatusBadge({ status }) {
  const cfg = {
    pending:  { cls:'bg-yellow-100 text-yellow-800 border-yellow-300', label:'Laukiama' },
    approved: { cls:'bg-green-100 text-green-800 border-green-300',   label:'Patvirtinta' },
    rejected: { cls:'bg-red-100 text-red-800 border-red-300',         label:'Atmesta' },
  };
  const c = cfg[status] || { cls:'bg-gray-100 text-gray-600 border-gray-300', label: status };
  return <span className={`inline-block font-mono text-[10px] font-bold tracking-wider uppercase px-2 py-1 border ${c.cls}`}>{c.label}</span>;
}

function SectionTitle({ tag, title, subtitle }) {
  return (
    <div className="text-center mb-10">
      <h2 className="font-grotesk font-black tracking-tighter leading-none uppercase mb-3"
          style={{ fontSize:'clamp(20px,5vw,60px)' }}>{title}</h2>
      {subtitle && <p className="font-mono text-[13px] text-gray-500 max-w-sm mx-auto">{subtitle}</p>}
    </div>

}

function Divider() { return null; }

function Toast({ toast }) {
  if (!toast) return null;
  const bg = toast.type === 'success' ? 'bg-green-700' : 'bg-red-600';
  return (
    <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-[200] toast ${bg} text-white font-mono text-[12px] font-bold tracking-wider px-6 py-3 shadow-xl`}>
      {toast.message}
    </div>
  );
}

    `radial-gradient(1.5px 1.5px at 150px 89.5px,${c} 100%,transparent 150%)`,
    `radial-gradient(4px 100px at 0px 299px,${c},transparent)`,
    `radial-gradient(4px 100px at 300px 299px,${c},transparent)`,
    `radial-gradient(1.5px 1.5px at 150px 149.5px,${c} 100%,transparent 150%)`,

  /* Unique city list */
  const cities = ['Visi', ...Array.from(
    new Map(published.map(e => e.city).filter(Boolean).map(c => [c.toLowerCase(), c])).values()
  ).sort()];
  const filtered = city === 'Visi' ? published : published.filter(e => e.city?.toLowerCase() === city.toLowerCase());

  return (
    <section id="renginiai" ref={ref} className="snap-section"
      style={{ backgroundImage:"url('bg.png')", backgroundSize:'cover', backgroundPosition:'center',
        backgroundAttachment:'fixed', paddingTop:'80px', paddingBottom:'60px' }}>
      <div style={{ maxWidth:'1100px', margin:'0 auto', padding:'0 24px' }}>

        {/* Header */}
        <div className={visible ? 'anim-fadeup' : ''} style={{ opacity: visible ? undefined : 0,
          marginBottom:'32px' }}>
          <h2 className="brand-title" style={{ fontSize:'clamp(20px,5vw,60px)', color:'#fff',
            letterSpacing:'-0.03em', margin:'0 0 6px', lineHeight:1,
            textShadow:'0 2px 12px rgba(0,0,0,0.4)' }}>
            Renginiai
          </h2>
          <p style={{ fontFamily:'monospace', fontSize:'11px', color:'rgba(255,255,255,0.6)',
            letterSpacing:'0.18em', textTransform:'uppercase', margin:0 }}>
            Artėjantys renginiai Lietuvoje
          </p>
        </div>

        {/* City filter pills */}
        {cities.length > 1 && (
          <div className={`anim-delay-1 ${visible ? 'anim-fadeup' : ''}`}
               style={{ opacity: visible ? undefined : 0,
                 display:'flex', gap:'8px', flexWrap:'wrap', marginBottom:'28px' }}>
            {cities.map(c => (
              <button key={c} onClick={() => setCity(c)} style={{
                fontFamily:'monospace', fontSize:'8px', fontWeight:700,
                textTransform:'uppercase', letterSpacing:'0.14em',
                padding:'6px 12px', borderRadius:'5px', cursor:'pointer',
                border: city === c ? '1.5px solid #fff' : '1.5px solid rgba(255,255,255,0.35)',
                background: city === c ? 'rgba(255,255,255,0.18)' : 'transparent',
                color: '#fff', backdropFilter:'blur(6px)',
                transition:'all 0.18s ease',
              }}>{c}</button>
            ))}
          </div>
        )}

        {/* Swipe hint + live dots */}
        {filtered.length > 0 && (
          <div style={{ display:'flex', alignItems:'center', gap:'10px', marginBottom:'16px' }}>
            <span style={{ fontFamily:'monospace', fontSize:'10px', color:'rgba(255,255,255,0.45)',
              letterSpacing:'0.15em', textTransform:'uppercase' }}>
              Swipinkite →
            </span>
            <div style={{ display:'flex', gap:'5px', alignItems:'center' }}>
              {filtered.map((_, i) => (
                <div key={i} style={{
                  width:  i === activeCard ? '18px' : '6px',
                  height: '6px',
                  borderRadius: '99px',
                  background: i === activeCard ? '#fff' : 'rgba(255,255,255,0.28)',
                  transition: 'all 0.35s cubic-bezier(0.16,1,0.3,1)',
                }} />
              ))}
            </div>
          </div>
        )}

        {/* Cards horizontal scroll */}
        {filtered.length === 0
          ? <p style={{ fontFamily:'monospace', fontSize:'13px', color:'rgba(255,255,255,0.5)',
              textAlign:'center', padding:'48px 0' }}>Nėra renginių.</p>
          : <div ref={scrollRef} className="cards-scroll" style={{
              display:'flex', flexDirection:'row', gap:'20px',
              overflowX:'auto', overflowY:'visible',
              paddingBottom:'16px', paddingRight:'24px',
              scrollSnapType:'x mandatory',
              WebkitOverflowScrolling:'touch',
              msOverflowStyle:'none', scrollbarWidth:'none',
            }}>
              {filtered.map((e, i) => (
                <div key={e.id}
                  className={`anim-delay-${Math.min(i % 4 + 1, 4)} ${visible ? 'anim-fadeup' : ''}`}
                  style={{ opacity: visible ? undefined : 0,
                    flexShrink:0, width: isMobile ? '80vw' : '300px', scrollSnapAlign:'start' }}>
                  <EventListItem event={e} />
                </div>
              ))}
            </div>
        }
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════════════════════════════
   § 11  SUBMIT EVENT FORM
══════════════════════════════════════════════════════════════════ */
const EMPTY_FORM = {
  title:'', date:'', time:'', city:'', venue:'', address:'',
  description:'', imageUrl:'', eventUrl:'', tag:'', price:'',
  note:'', email:'',
};

function SubmitEventForm({ onSubmit }) {
  const [f, setF]       = useState(EMPTY_FORM);
  const [state, setState] = useState('idle'); // idle | submitting | done | error
  const [errors, setErrors] = useState({});

  const set = k => e => setF(p => ({...p, [k]: e.target.value}));

  function handleImageFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onloadend = () => setF(p => ({...p, imageUrl: reader.result}));
    reader.readAsDataURL(file);
  }

  function validate() {
    const errs = {};
    if (!f.title.trim())       errs.title       = 'Įveskite pavadinimą';
    if (!f.date)               errs.date        = 'Pasirinkite datą';
    if (!f.city.trim())        errs.city        = 'Įveskite miestą';
    if (!f.description.trim()) errs.description = 'Parašykite trumpą aprašymą';
    return errs;
  }

  function handleSubmit(e) {
    e.preventDefault();
    const errs = validate();
    if (Object.keys(errs).length) { setErrors(errs); return; }
    setState('submitting');
    try {
      const sub = {
        id: uid(),
        status: 'pending',
        adminNotes: '',
        createdAt: new Date().toISOString(),
        // unified field names used by admin panel
        title:       f.title.trim(),
        date:        f.date,
        time:        f.time,
        city:        f.city.trim(),
        venue:       f.venue.trim(),
        address:     f.address.trim(),
        description: f.description.trim(),
        imageUrl:    f.imageUrl,
        eventUrl:    f.eventUrl.trim(),
        tag:         f.tag.trim(),
        price:       f.price.trim(),
        note:        f.note.trim(),
        email:       f.email.trim(),
        // keep extracted* aliases so admin edit modal works too
        extractedTitle:       f.title.trim(),
        extractedDate:        f.date,
        extractedCity:        f.city.trim(),
        extractedVenue:       f.venue.trim(),
        extractedAddress:     f.address.trim(),
        extractedDescription: f.description.trim(),
        extractedImage:       f.imageUrl,
        extractedTicketUrl:   f.eventUrl.trim(),
      };
      onSubmit(sub);
      setState('done');
    } catch {
      setState('error');
    }
  }

  function reset() { setF(EMPTY_FORM); setErrors({}); setState('idle'); }

  /* ── Success screen ── */
  if (state === 'done') return (
    <div style={{ background:'#fff', border:'2px solid #111', padding:'48px 32px', textAlign:'center' }}>
      <div style={{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:900, fontSize:'48px', marginBottom:'12px' }}>✓</div>
      <h3 style={{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:900, fontSize:'20px',
        textTransform:'uppercase', letterSpacing:'-0.02em', color:'#111', margin:'0 0 8px' }}>Pateikta!</h3>
      <p style={{ fontFamily:'monospace', fontSize:'12px', color:'rgba(0,0,0,0.5)', marginBottom:'6px' }}>
        Dėkojame! Renginys bus peržiūrėtas per 24 valandas.
      </p>
      {f.email && (
        <p style={{ fontFamily:'monospace', fontSize:'11px', color:'rgba(0,0,0,0.4)', marginBottom:'28px' }}>
          Atsakysime el. paštu <strong>{f.email}</strong>, jei turėsime klausimų.
        </p>
      )}
      <button onClick={reset} style={{ fontFamily:'monospace', fontSize:'11px', fontWeight:700,
        textTransform:'uppercase', letterSpacing:'0.14em', padding:'12px 28px',
        background:'#111', color:'#fff', border:'none', cursor:'pointer' }}>
        Pridėti kitą renginį
      </button>
    </div>
  );

  const field = (id, label, required, children, hint) => (
    <div>
      <label htmlFor={id}>
        {label}{required && <span className="text-red-500 ml-0.5">*</span>}
      </label>
      {children}
      {errors[id] && (
        <p className="font-mono text-[10px] text-red-500 mt-1">{errors[id]}</p>
      )}
      {hint && !errors[id] && (
        <p className="font-mono text-[10px] text-gray-400 mt-1">{hint}</p>
      )}
    </div>
  );

  return (
    <div className="form-card" style={{ background:'#fff', border:'2px solid #111', padding:'32px' }}>
      <div>
        <h4 style={{ fontFamily:"'Space Grotesk',sans-serif", fontWeight:900, fontSize:'18px',
          textTransform:'uppercase', letterSpacing:'-0.02em', color:'#111', margin:'0 0 4px' }}>Pridėk renginį</h4>
        <p style={{ fontFamily:'monospace', fontSize:'11px', color:'rgba(0,0,0,0.4)', margin:'0 0 24px' }}>
          Užpildyk formą — peržiūrėsime ir paskelbsime per 24 val.
        </p>

        <form onSubmit={handleSubmit} noValidate className="flex flex-col gap-6">

          {/* ── Required fields ── */}
          <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">

            {field('title', 'Renginio pavadinimas', true,
              <input id="title" className={`field ${errors.title?'border-red-500':''}`}
                placeholder="pvz. Elektroninės muzikos vakaras"
                value={f.title} onChange={set('title')}
                onFocus={() => setErrors(p=>({...p,title:''}))} />
            )}

            {field('tag', 'Kategorija',  false,
              <input id="tag" className="field"
                placeholder="Muzika / Menas / Festivalis..."
                value={f.tag} onChange={set('tag')} />
            )}

            {field('date', 'Data', true,
              <input id="date" type="date" className={`field ${errors.date?'border-red-500':''}`}
                value={f.date} onChange={set('date')}
                onFocus={() => setErrors(p=>({...p,date:''}))} />,
              'Renginiai, kurių data praėjo, automatiškai pašalinami.'
            )}

            {field('time', 'Pradžios laikas', false,
              <input id="time" type="time" className="field"
                value={f.time} onChange={set('time')} />
            )}

            {field('city', 'Miestas', true,
              <input id="city" className={`field ${errors.city?'border-red-500':''}`}
                placeholder="Vilnius"
                value={f.city} onChange={set('city')}
                onFocus={() => setErrors(p=>({...p,city:''}))} />
            )}

            {field('venue', 'Vieta / Salė', false,
              <input id="venue" className="field"
                placeholder="Opium Club, Žalgirio arena..."
                value={f.venue} onChange={set('venue')} />
            )}

            <div className="sm:col-span-2">
              {field('address', 'Tikslus adresas', false,
                <input id="address" className="field"
                  placeholder="Gatvė ir miestas — reikalinga žemėlapio mygtukui"
                  value={f.address} onChange={set('address')} />
              )}
            </div>

            <div className="sm:col-span-2">
              {field('description', 'Aprašymas', true,
                <textarea id="description" rows={4}
                  className={`field resize-none ${errors.description?'border-red-500':''}`}
                  placeholder="Trumpai apibūdink renginį — ką pamatys / išgirs lankytojai..."
                  value={f.description} onChange={set('description')}
                  onFocus={() => setErrors(p=>({...p,description:''}))} />,
                null
              )}
            </div>

            {field('price', 'Kaina', false,
              <input id="price" className="field"
                placeholder="Nuo 15€ / Nemokama"
                value={f.price} onChange={set('price')} />
            )}

            {field('eventUrl', 'Bilietų / Renginio nuoroda', false,
              <input id="eventUrl" type="url" className="field"
                placeholder="https://bilietai.lt/..."
                value={f.eventUrl} onChange={set('eventUrl')} />
            )}
          </div>

          {/* ── Poster upload ── */}
          <div>
            <label>Plakatas / Nuotrauka</label>
            <div className="flex gap-4 items-start mt-2">
              {/* Preview */}
              <div className="flex-shrink-0 overflow-hidden bg-gray-100"
                   style={{ width:'72px', height:'96px', border:'2px dashed #d1d5db' }}>
                {f.imageUrl
                  ? <img src={f.imageUrl} alt="" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                  : <div className="w-full h-full flex items-center justify-center">
                      <span className="font-mono text-[9px] text-gray-300 text-center leading-tight px-1">Nėra<br/>plakato</span>
                    </div>
                }
              </div>
              <div className="flex-1 flex flex-col gap-3">
                {/* File picker */}
                <div>
                  <label style={{ display:'inline-flex', alignItems:'center', gap:'6px',
                    padding:'9px 14px', background:'#111', color:'#fff',
                    fontFamily:'monospace', fontSize:'11px', letterSpacing:'0.1em',
                    textTransform:'uppercase', cursor:'pointer' }}>
                    📁 Pasirinkti failą iš kompiuterio
                    <input type="file" accept="image/*" style={{ display:'none' }}
                      onChange={handleImageFile} />
                  </label>
                  {f.imageUrl?.startsWith('data:') && (
                    <p className="font-mono text-[10px] text-green-600 mt-1">✓ Nuotrauka įkelta</p>
                  )}
                </div>
                {/* URL fallback */}
                <div>
                  <p className="font-mono text-[10px] text-gray-400 mb-1">Arba įklijuok nuorodos URL:</p>
                  <input className="field" placeholder="https://..."
                    value={f.imageUrl?.startsWith('data:') ? '' : (f.imageUrl||'')}
                    onChange={set('imageUrl')} />
                </div>
                {f.imageUrl && (
                  <button type="button" onClick={() => setF(p=>({...p,imageUrl:''}))}
                    className="font-mono text-[10px] text-red-400 underline text-left w-fit">
                    ✕ Pašalinti nuotrauką
                  </button>
                )}
              </div>
            </div>
          </div>

          {/* ── Divider ── */}
          <div className="border-t border-black/10 pt-2">
            <p className="font-mono text-[10px] text-gray-400 mb-4">
              Neprivalomi laukai — bet labai padeda susisiekti, jei reikia patikslinti:
            </p>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
              {field('email', 'El. paštas (susisieksime, jei reikės pataisymų)', false,
                <input id="email" type="email" className="field"
                  placeholder="jusu@pastas.lt"
                  value={f.email} onChange={set('email')} />
              )}
              {field('note', 'Pastaba administratoriui', false,
                <input id="note" className="field"
                  placeholder="Papildoma info, kurią norėtumei perduoti..."
                  value={f.note} onChange={set('note')} />
              )}
            </div>
          </div>

          {state === 'error' && (
            <p className="font-mono text-[11px] text-red-600">Kažkas nepavyko. Bandykite dar kartą.</p>
          )}

          <button type="submit" disabled={state==='submitting'}
            style={{ fontFamily:'monospace', fontSize:'11px', fontWeight:700,
              textTransform:'uppercase', letterSpacing:'0.14em', padding:'14px 32px',
              background:'#111', color:'#fff', border:'none',
              cursor: state==='submitting' ? 'wait' : 'pointer',
              opacity: state==='submitting' ? 0.5 : 1, alignSelf:'flex-start' }}>
            {state==='submitting' ? 'Siunčiama...' : 'Pateikti renginį →'}
          </button>

          <p style={{ fontFamily:'monospace', fontSize:'10px', color:'rgba(0,0,0,0.35)', margin:'-8px 0 0' }}>
            Renginiai paskelbiami tik po administratoriaus patvirtinimo.
          </p>
        </form>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════════════════════════════
   § 12  ADMIN — SUBMISSION EDIT MODAL
══════════════════════════════════════════════════════════════════ */
function SubmissionEditModal({ item, onSave, onClose }) {
  const [f, setF] = useState({ ...item });
  const set = k => e => setF(p=>({...p, [k]: e.target.value}));

  const titleKey = 'extractedTitle'       in item ? 'extractedTitle'       : 'title';
  const dateKey  = 'extractedDate'        in item ? 'extractedDate'        : 'date';
  const cityKey  = 'extractedCity'        in item ? 'extractedCity'        : 'city';
  const venueKey = 'extractedVenue'       in item ? 'extractedVenue'       : 'venue';
  const addrKey  = 'extractedAddress'     in item ? 'extractedAddress'     : 'address';
  const descKey  = 'extractedDescription' in item ? 'extractedDescription' : 'description';
  const imgKey   = 'extractedImage'       in item ? 'extractedImage'       : 'image';
  const tickKey  = 'extractedTicketUrl'   in item ? 'extractedTicketUrl'   : 'ticketUrl';
  const isEvent  = !('sourceUrl' in item);

  function handleImageFile(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onloadend = () => setF(p => ({...p, [imgKey]: reader.result}));
    reader.readAsDataURL(file);
  }

  useEffect(() => {
    const h = e => e.key==='Escape' && onClose();
    window.addEventListener('keydown', h);
    document.body.style.overflow='hidden';
    return () => { window.removeEventListener('keydown', h); document.body.style.overflow=''; };
  }, [onClose]);

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4"
         style={{ background:'rgba(0,0,0,0.82)', backdropFilter:'blur(6px)' }}
         onClick={onClose}>
      <div className="modal-card relative w-full max-w-2xl max-h-[92vh] overflow-y-auto p-6 md:p-8"
           style={{ background:'rgba(255,255,255,0.92)' }}
           onClick={e=>e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-3 right-3 w-8 h-8 flex items-center justify-center border-2 border-black font-mono text-sm font-bold bg-white hover:bg-black hover:text-white transition-colors">✕</button>
        <h3 className="font-grotesk font-black text-xl uppercase mb-5">
          {item._isNew ? '+ Naujas renginys' : 'Redaguoti duomenis'}
        </h3>

/* ══════════════════════════════════════════════════════════════════
   § 15  ADMIN DASHBOARD
══════════════════════════════════════════════════════════════════ */
function AdminDashboard({ submissions, events, setSubmissions, setEvents, onBack, toast, setToast }) {
  const [tab, setTab]         = useState('submissions');
  const [editing, setEditing] = useState(null);

  const pending  = submissions.filter(s => s.status === 'pending').length;
  const approved = submissions.filter(s => s.status === 'approved').length;
  const rejected = submissions.filter(s => s.status === 'rejected').length;
  const featured = events.filter(e => e.featured).length;

  function showToast(message, type='success') {
    setToast({ message, type });
    setTimeout(() => setToast(null), 2500);
  }

  function handleApprove(id) {
    const sub = submissions.find(s => s.id === id);
    if (!sub) return;
    // TODO: approveAndPublish() will POST to backend
    const newEvent = approveAndPublish(sub);
    setSubmissions(p => p.map(s => s.id===id ? {...s, status:'approved'} : s));
    setEvents(p => [...p, newEvent]);
    showToast('Renginys patvirtintas ir paskelbtas!');
  }

  function handleReject(id) {
    // TODO: rejectSubmissionBackend(id)
    rejectSubmissionBackend(id);
    setSubmissions(p => p.map(s => s.id===id ? {...s, status:'rejected'} : s));
    showToast('Renginys atmestas.', 'error');
  }

  function handleSaveSubmission(updated) {
    setSubmissions(p => p.map(s => s.id===updated.id ? updated : s));
    setEditing(null);
    showToast('Duomenys išsaugoti.');
  }

  function handleSaveEvent(updated) {
    if (updated._isNew) {
      const { _isNew, ...clean } = updated;
      const newEv = { ...clean, id: Date.now(), approved: true, createdAt: new Date().toISOString() };
      setEvents(p => [...p, newEv]);
      setEditing(null);
      showToast('Renginys pridėtas!');
      return;
    }
    updateEventBackend(updated);
    setEvents(p => p.map(e => e.id===updated.id ? updated : e));
    setEditing(null);
    showToast('Renginys atnaujintas.');
  }

  function handleDeleteEvent(id) {
    setEvents(p => p.filter(e => e.id !== id));
    showToast('Renginys ištrintas.', 'error');
  }

  function handleAddEvent() {
    setEditing({
      _isNew: true,
      title: '', date: '', time: '', city: '', venue: '', address: '',
      description: '', image: '', ticketUrl: '', tag: '', price: '',
      featured: false, approved: true,
    });
  }

  function handleToggleFeatured(id) {
    const ev = events.find(e => e.id===id);
    const willBeOn = !ev?.featured;
    const currentFeatured = events.filter(e => e.featured).length;
    if (willBeOn && currentFeatured >= 3) {
      showToast('Jau yra 3 rekomenduojami renginiai. Pašalinkite vieną prieš pridedant kitą.', 'error');
      return;
    }
    setEvents(p => p.map(e => e.id===id ? {...e, featured:!e.featured} : e));
    showToast(willBeOn ? 'Pažymėta kaip rekomenduojamas.' : 'Pašalinta iš rekomenduojamų.');
  }

  return (
    <div className="min-h-screen px-4 md:px-8 py-8 max-w-4xl mx-auto">
      {/* Header */}
      <div className="flex items-center justify-between mb-8 flex-wrap gap-4">
        <div>
          <button onClick={onBack} className="font-mono text-[11px] text-gray-500 hover:text-black transition-colors mb-2 flex items-center gap-1">
            ← Grįžti į svetainę
          </button>
          <h1 className="font-grotesk font-black text-3xl uppercase tracking-tight">Admin · Moderavimas</h1>
        </div>
        {/* TODO: Add admin logout button here */}
      </div>

      {/* Stats */}
      <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8">
        {[
          ['Laukia peržiūros', pending,  'bg-yellow-50 border-yellow-200'],
          ['Patvirtinta',      approved, 'bg-green-50 border-green-200'],
          ['Atmesta',          rejected, 'bg-red-50 border-red-200'],
          ['Rekomenduojami',   `${featured}/3`, 'bg-blue-50 border-blue-200'],
        ].map(([l,v,cls]) => (
          <div key={l} className={`p-4 border-2 ${cls}`}>
            <div className="font-grotesk font-black text-3xl">{v}</div>
            <div className="font-mono text-[10px] uppercase tracking-wider text-gray-500 mt-1">{l}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div className="flex gap-2 mb-6 flex-wrap">
        <button className={`tab-btn ${tab==='submissions'?'active':''}`} onClick={()=>setTab('submissions')}>
          Pateikti renginiai ({submissions.length})
        </button>
        <button className={`tab-btn ${tab==='events'?'active':''}`} onClick={()=>setTab('events')}>
          Visi renginiai ({events.length})
        </button>
      </div>

      {/* Submissions tab */}
      {tab === 'submissions' && (
        <div>
          {/* Filter pills */}
          {submissions.length === 0
            ? <p className="font-mono text-[13px] text-gray-400 py-8 text-center">Nėra pateiktų renginių.</p>
            : submissions.map(s => (
                <SubmissionReviewCard key={s.id} sub={s}
                  onApprove={handleApprove}
                  onReject={handleReject}
                  onEdit={setEditing} />
              ))
          }
        </div>
      )}

      {/* Events tab */}
      {tab === 'events' && (
        <div>
          <div className="flex items-center justify-between flex-wrap gap-3 mb-5">
            <p className="font-mono text-[11px] text-gray-500">
              Rekomenduojami ({featured}/3) rodomi duonos kortelėse. Maks. 3.
            </p>
            <button onClick={handleAddEvent}
              style={{ display:'inline-flex', alignItems:'center', gap:'6px', padding:'10px 18px', background:'#111', color:'#fff', fontFamily:'monospace', fontSize:'11px', letterSpacing:'0.1em', textTransform:'uppercase', border:'none', cursor:'pointer' }}>
              + Pridėti renginį
            </button>
          </div>
          {events.length === 0
            ? <p className="font-mono text-[13px] text-gray-400 py-8 text-center">Nėra renginių.</p>
            : events.map(e => (
                <AdminEventCard key={e.id} event={e}
                  onToggleFeatured={handleToggleFeatured}
                  onEdit={setEditing}
                  onDelete={handleDeleteEvent} />
              ))
          }
        </div>
      )}

      {/* Edit / Add modal */}
      {editing && (
        <SubmissionEditModal
          item={editing}
          onSave={('sourceUrl' in editing && !editing._isNew) ? handleSaveSubmission : handleSaveEvent}
          onClose={() => setEditing(null)} />
      )}
    </div>
  );
}

/* Full-screen lightbox */
function PhotoLightbox({ photo, onClose }) {
  useEffect(() => {
    const h = e => e.key === 'Escape' && onClose();
    window.addEventListener('keydown', h);
    document.body.style.overflow = 'hidden';
    return () => { window.removeEventListener('keydown', h); document.body.style.overflow = ''; };
  }, [onClose]);

  return (
    <div onClick={onClose} style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.93)',
      zIndex:200, display:'flex', alignItems:'center', justifyContent:'center', padding:'20px' }}>
      <div style={{ maxWidth:'92vw', maxHeight:'92vh', position:'relative' }}
        onClick={e => e.stopPropagation()}>
        <img src={photo.imageData || photo.image_data || ''} alt={photo.caption || ''}
          style={{ maxWidth:'100%', maxHeight:'82vh', objectFit:'contain', display:'block' }} />
        {(photo.caption || photo.eventName || photo.authorName) && (
          <div style={{ background:'rgba(0,0,0,0.75)', padding:'10px 14px' }}>
            {photo.caption && (
              <p style={{ fontFamily:'monospace', fontSize:'13px', color:'#fff', margin:0 }}>
                {photo.caption}
              </p>

/* ══════════════════════════════════════════════════════════════════
   § 16c  FLOATING PHOTO  — polaroid that drifts right→left
══════════════════════════════════════════════════════════════════ */
function FloatingPhoto({ photo, idx, contained = false }) {
  const ref           = useRef(null);
  const isDraggingRef = useRef(false);
  const dragOffset    = useRef({ x:0, y:0 });
  const dragStartPos  = useRef({ x:0, y:0 });
  const resumeTimer   = useRef(null);

  const [pos,      setPos]      = useState(null);   // null = CSS anim, {x,y} = manual
  const [dragging, setDragging] = useState(false);
  const [lightbox, setLightbox] = useState(false);
  const zBase = (idx % 8) + 2;
  const [zIdx, setZIdx] = useState(zBase);

  /* Stable pseudo-randoms per photo */
  const s = idx + 1;
  const r = n => Math.abs(Math.sin(s * 13.7 + n * 5.3));
  const width = Math.round(110 + r(1) * 130);   // 110–240 px
  const top   = Math.round(4   + r(2) * 60);    // 4–64 %
  const rot   = +((r(3) - 0.5) * 10).toFixed(2); // –5 → +5 deg
  const dur   = Math.round(22  + r(4) * 30);    // 22–52 s
  const delay = -parseFloat((r(5) * dur).toFixed(1)); // start mid-flight

  const isMobile = () => window.innerWidth < 640;

  function onPointerDown(e) {
    if (e.button !== 0 && e.pointerType !== 'touch') return;
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);
    if (resumeTimer.current) clearTimeout(resumeTimer.current);
    const rect = ref.current.getBoundingClientRect();
    dragOffset.current   = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    dragStartPos.current = { x: e.clientX, y: e.clientY };
    isDraggingRef.current = true;
    setPos({ x: rect.left, y: rect.top });
    setDragging(true);
    setZIdx(9999);
  }

  function onPointerMove(e) {
    if (!isDraggingRef.current) return;
    setPos({ x: e.clientX - dragOffset.current.x, y: e.clientY - dragOffset.current.y });
  }

  function onPointerUp(e) {
    if (!isDraggingRef.current) return;
    isDraggingRef.current = false;
    setDragging(false);
    const dx = Math.abs(e.clientX - dragStartPos.current.x);
    const dy = Math.abs(e.clientY - dragStartPos.current.y);
    if (dx < 6 && dy < 6) {
      /* tap / click → lightbox */
      setPos(null); setZIdx(zBase); setLightbox(true); return;
    }
    /* drag ended — hold position 5 s, then re-enter from right */
    setZIdx(zBase + 1);
    resumeTimer.current = setTimeout(() => { setPos(null); setZIdx(zBase); }, 5000);
  }

  const base = {
    position: contained ? 'absolute' : 'fixed', width: width + 'px',
    userSelect: 'none', pointerEvents: 'auto',
    touchAction: isMobile() ? 'auto' : 'none',
    zIndex: zIdx,
  };

  const animStyle = {
    ...base,
    left: '110%', top: top + '%',
    transform: `rotate(${rot}deg)`,
    animation: `floatLeft ${dur}s linear ${delay}s infinite`,
    cursor: isMobile() ? 'default' : 'grab',
  };

  const heldStyle = {
    ...base,
    left: (pos?.x ?? 0) + 'px',
    top:  (pos?.y ?? 0) + 'px',
    transform: `rotate(${dragging ? rot * 1.4 : rot}deg) scale(${dragging ? 1.06 : 1})`,
    transition: dragging ? 'none' : 'transform 0.35s ease',
    cursor: dragging ? 'grabbing' : 'grab',
  };

  return (
    <>
      <div ref={ref} style={pos !== null ? heldStyle : animStyle}
        onPointerDown={isMobile() ? undefined : onPointerDown}
        onPointerMove={isMobile() ? undefined : onPointerMove}
        onPointerUp={isMobile()   ? undefined : onPointerUp}>
        {/* Polaroid frame */}
        <div style={{
          background: '#fff', padding: '7px 7px 28px', pointerEvents: 'none',
          boxShadow: dragging
            ? '0 22px 60px rgba(0,0,0,0.5)'
            : '0 6px 28px rgba(0,0,0,0.38), 0 1px 4px rgba(0,0,0,0.14)',
          transition: 'box-shadow 0.2s',
        }}>
          <img src={photo.imageData || photo.image_data || ''} alt={photo.caption || ''} draggable={false}
            style={{ width:'100%', display:'block', aspectRatio:'1/1', objectFit:'cover' }} />
          <p style={{
            fontFamily:'monospace', fontSize:'9px', textAlign:'center',
            marginTop:'5px', color:'#555', lineHeight:1.3,
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap', padding:'0 2px',
            minHeight:'12px',
          }}>{photo.caption || '\u00A0'}</p>
        </div>
      </div>
      {lightbox && <PhotoLightbox photo={photo} onClose={() => setLightbox(false)} />}
    </>
  );
}

/* ══════════════════════════════════════════════════════════════════
   § 16e  useInView — trigger animation when element enters viewport
══════════════════════════════════════════════════════════════════ */
function useInView(ref, threshold = 0.15) {
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(
      ([entry]) => { if (entry.isIntersecting) setVisible(true); },
      { threshold }
    );
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return visible;
}

/* ══════════════════════════════════════════════════════════════════
   § 16g  FLOATING EVENT CARD  — drifts right→left in section 2
══════════════════════════════════════════════════════════════════ */
function FloatingEventCard({ event, idx }) {
  const s   = idx + 1;
  const r   = n => Math.abs(Math.sin(s * 11.3 + n * 6.7));
  const w   = Math.round(160 + r(1) * 100);  // 160–260 px
  const top = Math.round(6   + r(2) * 58);   // 6–64 %
  const rot = +((r(3) - 0.5) * 8).toFixed(2); // –4 → +4 deg
  const dur = Math.round(30  + r(4) * 20);   // 30–50 s
  const del = -parseFloat((r(5) * dur).toFixed(1));

  const img = event.image || event.imageUrl || '';
  const d   = event.date ? new Date(event.date + 'T00:00:00') : null;
  const NEON = '#ff2d78';

  return (
    <div className="float-card" style={{
      position:'absolute', left:'110%', top: top + '%', width: w + 'px',
      animation: `floatLeft ${dur}s linear ${del}s infinite`,
      transform: `rotate(${rot}deg)`,
      cursor: 'pointer', userSelect:'none',
    }}>
      <div style={{ background:'#fff', padding:'7px 7px 22px',
        boxShadow:'0 8px 32px rgba(0,0,0,0.45), 0 2px 6px rgba(0,0,0,0.2)',
        borderRadius:'2px' }}>
        {/* Image */}
        <div style={{ width:'100%', aspectRatio:'4/3', overflow:'hidden', background:'#111' }}>
          {img
            ? <img src={img} alt={event.title} draggable={false}
                style={{ width:'100%', height:'100%', objectFit:'cover', display:'block', pointerEvents:'none' }} />
            : <div style={{ width:'100%', height:'100%', background:'#222' }} />
          }
        </div>
        {/* Info */}
        <div style={{ paddingTop:'8px', paddingLeft:'2px' }}>
          <p style={{ fontFamily:'monospace', fontSize:'9px', fontWeight:700,
            color: NEON, textTransform:'uppercase', letterSpacing:'0.1em', margin:'0 0 2px' }}>
            {d ? `${LT_MONTHS[d.getMonth()].slice(0,3)} ${d.getDate()}` : ''}
          </p>
          <p style={{ fontFamily:'var(--brand-font)', fontSize:'11px',
            fontWeight:900, color:'#111', margin:0, lineHeight:1.3,
            overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>

          {event.city && (
            <p style={{ fontFamily:'monospace', fontSize:'9px', color:'#999', margin:'2px 0 0' }}>
              {event.city}
            </p>
          )}
        </div>
      </div>
    </div>
  );
}

/* ── Supabase client ── */
const SUPA_URL = 'https://okaxtapijyxqerkzscyw.supabase.co';
const SUPA_KEY = 'sb_publishable_rrtmucOsKRdZSnNoNEbbuw_ls_IRjaL';
const supa = supabase.createClient(SUPA_URL, SUPA_KEY);

function isPastEvent(item) {
  const d = item.date || item.extractedDate;
  if (!d) return false;
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  return new Date(d + 'T00:00:00') < today;
}

async function loadPublicEvents() {
  try {
    const { data, error } = await supa
      .from('events')
      .select('*')
      .eq('status', 'published')
      .order('date', { ascending: true });
    if (error) throw error;
    return (data || []).map(e => ({
      ...e,
      imageUrl: e.image_url, image: e.image_url,
      eventUrl: e.event_url, ticketUrl: e.event_url,
    })).filter(e => !isPastEvent(e));
  } catch { return []; }
}

async function saveEventToSupa(item) {
  const row = {
    id: String(item.id || Date.now()),
    title: item.title || '',
    description: item.description || '',
    date: item.date || null,
    time: item.time || '',
    city: item.city || '',
    venue: item.venue || '',
    address: item.address || '',
    image_url: item.imageUrl || item.image || '',
    event_url: item.eventUrl || item.ticketUrl || '',
    tag: item.tag || '',
    price: item.price || '',
    note: item.note || '',
    email: item.email || '',
    status: item.status || 'pending',
    featured: item.featured || false,
  };
  await supa.from('events').upsert(row);
}

function App() {
  const [events,   setEvents]   = useState([]);
  const [eventsReady, setEventsReady] = useState(false);
  const [breadReady, setBreadReady]   = useState(false);
  const [breadSrc, setBreadSrc] = useState('bread.png');
  const [logoSrc,  setLogoSrc]  = useState('logo-hand.png');
  const [openEvent, setOpenEvent] = useState(null);
  const [toast,     setToast]     = useState(null);

  useEffect(() => {
    loadPublicEvents()
      .then(evs => setEvents(evs))
      .finally(() => setEventsReady(true));

    removeWhiteBackground('bread.png', src => {
      setBreadSrc(src);
      setBreadReady(true);
    });
    const breadFailsafe = setTimeout(() => setBreadReady(true), 10000);

    removeWhiteBackgroundGlobal('logo-hand.png', src => setLogoSrc(src));

    // Realtime: refresh events when DB changes
    const channel = supa.channel('events-public')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'events' }, () => {
        loadPublicEvents().then(evs => setEvents(evs));
      }).subscribe();
    return () => {
      clearTimeout(breadFailsafe);
      supa.removeChannel(channel);
    };
  }, []);

  async function handleNewSubmission(sub) {
    await saveEventToSupa({
      ...sub,
      id: sub.id || String(Date.now()),
      title: sub.title || sub.extractedTitle || '',

    setToast({ message:'Renginys pateiktas peržiūrai!', type:'success' });

  }

  // Only show published events on the public site
  const publishedEvents = events

    .map(e => ({ ...e, image: e.imageUrl || e.image, ticketUrl: e.eventUrl || e.ticketUrl }))

}

<script>
  (function() {
    function initSectionObserver() {
      const rootEl   = document.getElementById('root');
      const sections = document.querySelectorAll('.snap-section, .snap-strict');
      if (!sections.length) { setTimeout(initSectionObserver, 150); return; }

      // Stagger delays so each section has a unique entrance feel
      const delays = [0, 0, 80, 60, 40, 20];
      sections.forEach((s, i) => {
        s.style.transitionDelay = (delays[i] || 0) + 'ms';
      });

      const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          // Only ever ADD in-view, never remove — no flash when scrolling away
          if (entry.isIntersecting) {
            entry.target.classList.add('in-view');
          }
        });
      }, {
        threshold: 0.05,  // trigger very early — just 5% visible
        root: rootEl,
      });

      sections.forEach(s => obs.observe(s));

      // Also watch scroll to pre-trigger next section slightly before snap
      let lastSnap = 0;
      rootEl.addEventListener('scroll', () => {
        const now = Date.now();
        if (now - lastSnap < 50) return;
        lastSnap = now;
        const scrollTop = rootEl.scrollTop;
        const vh = rootEl.clientHeight;
        sections.forEach(s => {
          const top = s.offsetTop;
          // Pre-trigger if within 30% of the next section
          if (scrollTop + vh * 1.3 > top) {
            s.classList.add('in-view');
          }
        });
      }, { passive: true });
    }
    initSectionObserver();
  })();
</script>
