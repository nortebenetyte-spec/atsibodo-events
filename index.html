<!DOCTYPE html>
<html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atsibodo neveikti? — Renginiai Lietuvoje</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="image" href="bread.png" />
  <link rel="preload" as="image" href="logo-hand.png" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tailwind-built.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    /* ── Brand font — Space Grotesk ─── */
    :root { --brand-font: 'Space Grotesk', sans-serif; }
    .brand-title {
      font-family: 'Space Grotesk', sans-serif !important;
      font-weight: 900;
      letter-spacing: -0.03em;
      text-transform: uppercase;
    }

    /* ── Main scroll: continuous (no page snapping) ───────────────── */
    html, body { height: 100%; margin: 0; overflow: hidden; }
    #root {
      height: 100vh;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-snap-type: none;
      scroll-behavior: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: none;
      font-family: 'JetBrains Mono', monospace;
      -webkit-font-smoothing: antialiased;
      /* Isolate scroll layer — smoother repaints on long pages */
      isolation: isolate;
    }
    /* Hide scrollbar */
    #root::-webkit-scrollbar { display: none; }
    #root { -ms-overflow-style: none; scrollbar-width: none; }
    .cards-scroll::-webkit-scrollbar { display: none; }

    .snap-section {
      min-height: 100vh;
      position: relative;
      contain: layout style;
      opacity: 0;
      transform: translate3d(0, 28px, 0) scale(0.99);
      transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .snap-section.in-view {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
    }
    /* Full-viewport blocks (gallery polaroids use position:absolute — need fixed height) */
    .snap-strict {
      min-height: 100vh;
      min-height: 100dvh;
      height: 100vh;
      height: 100dvh;
      box-sizing: border-box;
      overflow: hidden;
      position: relative;
      contain: layout style;
      opacity: 0;
      transform: translate3d(0, 28px, 0) scale(0.99);
      transition: opacity 0.55s cubic-bezier(0.22, 1, 0.36, 1),
                  transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .snap-strict.in-view {
      opacity: 1;
      transform: translate3d(0, 0, 0) scale(1);
    }

    /* ── Mobile responsiveness ───────────────────────────────────── */
    @media (max-width: 768px) {

      /* Bread cards — stack vertically */
      .bread-grid {
        grid-template-columns: 1fr !important;
        gap: 20px !important;
        max-width: 300px;
        margin: 0 auto;
      }

      /* Section titles — smaller on mobile */
      .brand-title {
        font-size: clamp(20px, 7vw, 32px) !important;
      }

      /* Logo — smaller */
      .logo-img {
        height: clamp(60px, 18vw, 110px) !important;
      }

      /* Event detail modal — stack image above info */
      .modal-card > div {
        flex-direction: column !important;
      }
      .modal-card > div > div:first-child {
        width: 100% !important;
        min-height: 180px !important;
        max-height: 220px !important;
      }
      .modal-card > div > div:last-child {
        padding: 18px 16px !important;
      }

      /* Submit section buttons — full width */
      .submit-btns {
        max-width: 100% !important;
      }

      /* Forms — reduce padding */
      .form-card {
        padding: 20px !important;
      }

      /* Hint / subtitle text */
      .section-hint {
        font-size: 9px !important;
      }
    }

    @media (max-width: 480px) {
      .brand-title {
        font-size: clamp(18px, 8vw, 28px) !important;
      }
      .logo-img {
        height: clamp(50px, 16vw, 90px) !important;
      }
    }

    /* ── Bread card ──────────────────────────────────────────────── */
    .bread-card {
      background: transparent !important;
      background-color: transparent !important;
      border: none; outline: none; padding: 0; margin: 0;
      appearance: none; -webkit-appearance: none; box-shadow: none;
      cursor: pointer;
      transition: transform 0.42s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .bread-card:hover { transform: rotate(0deg) translateY(-16px) scale(1.025) !important; }
    .bread-wrapper { position: relative; background: transparent !important; }
    .bread-photo {
      display: block; width: 100%;
      filter: drop-shadow(5px 18px 24px rgba(0,0,0,0.28));
    }
    .bread-poster-frame {
      position: absolute; left: 50%; top: 50%;
      transform: translate(-50%, -50%);
      width: 44%;
      box-shadow: 0 6px 20px rgba(0,0,0,0.50);
      z-index: 2; overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .bread-card:hover .bread-poster-frame {
      box-shadow: 0 10px 30px rgba(0,0,0,0.60);
      transform: translate(-50%, -52%);
    }
    .bread-poster-frame img { display: block; width: 100%; aspect-ratio: 3/4; object-fit: cover; }
    .bread-overlay {
      position: absolute; inset: 0; opacity: 0;
      transition: opacity 0.25s ease; z-index: 3;
    }
    .bread-card:hover .bread-overlay { opacity: 1; }
    .bread-info-strip {
      position: absolute; bottom: 0; left: 0; right: 0;
      transform: translateY(4px); opacity: 0.85;
      transition: transform 0.3s ease, opacity 0.3s ease; z-index: 4;
    }
    .bread-card:hover .bread-info-strip { transform: translateY(0); opacity: 1; }
    .bread-sticker { transition: transform 0.3s ease; z-index: 5; }
    .bread-card:hover .bread-sticker { transform: rotate(-4deg) scale(1.06); }

    /* ── Modals ──────────────────────────────────────────────────── */
    @keyframes modalIn {
      from { opacity: 0; transform: scale(0.90) translateY(28px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);    }
    }
    .modal-card { animation: modalIn 0.36s cubic-bezier(0.34,1.46,0.64,1) forwards; }

    /* ── Toast notification ──────────────────────────────────────── */
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .toast { animation: toastIn 0.25s ease forwards; }

    /* ── Event list item ─────────────────────────────────────────── */
    .event-row { transition: background 0.2s ease; }
    .event-row:hover { background: rgba(0,0,0,0.03); }

    /* ── Form inputs ─────────────────────────────────────────────── */
    .field {
      width: 100%; background: rgba(255,255,255,0.6); border: 2px solid rgba(0,0,0,0.15);
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      padding: 10px 12px; outline: none; transition: border-color 0.2s;
    }
    .field:focus { border-color: #000; }
    label { display: block; font-family: 'JetBrains Mono', monospace; font-size: 10px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em;
      margin-bottom: 5px; color: #555; }

    /* ── Admin ───────────────────────────────────────────────────── */
    .admin-card { background: rgba(255,255,255,0.55); border: 1.5px solid rgba(0,0,0,0.12); }
    .tab-btn { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.12em; padding: 8px 20px;
      border: 2px solid transparent; cursor: pointer; transition: all 0.2s; background: transparent; }
    .tab-btn.active { border-color: #000; background: #000; color: #fff; }
    .tab-btn:not(.active) { border-color: rgba(0,0,0,0.2); color: #666; }
    .tab-btn:not(.active):hover { border-color: #000; color: #000; }

    /* ── Floating gallery / event cards ─────────────────────────── */
    /* GPU path: transform only (animating `left` forces layout every frame) */
    @keyframes floatLeftGPU {
      from { transform: translate3d(0, 0, 0) rotate(var(--fp-rot, 0deg)); }
      to   { transform: translate3d(calc(-100vw - 100% - 64px), 0, 0) rotate(var(--fp-rot, 0deg)); }
    }
    .content-section { position: relative; z-index: 10; }

    /* ── Section entrance animations ────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(36px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes bounceDot {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(10px); }
    }
    .anim-fadeup  { animation: fadeUp  0.75s cubic-bezier(0.22,1,0.36,1) forwards; }
    .anim-fadein  { animation: fadeIn  0.6s ease forwards; }
    .anim-bounce  { animation: bounceDot 1.6s ease-in-out infinite; }
    .anim-delay-1 { animation-delay: 0.15s; opacity: 0; }
    .anim-delay-2 { animation-delay: 0.3s;  opacity: 0; }
    .anim-delay-3 { animation-delay: 0.5s;  opacity: 0; }
    .anim-delay-4 { animation-delay: 0.7s;  opacity: 0; }

    /* ── Pause floating on hover ─────────────────────────────────── */
    .float-card:hover { animation-play-state: paused !important; z-index: 50 !important; }

    /* ── Falling pattern (ported from framer-motion to pure CSS) ── */
    @keyframes fallingPatternAnim {
      from {
        background-position:
          0px 220px,3px 220px,151.5px 337.5px,
          25px 24px,28px 24px,176.5px 150px,
          50px 16px,53px 16px,201.5px 91px,
          75px 224px,78px 224px,226.5px 230.5px,
          100px 19px,103px 19px,251.5px 121px,
          125px 120px,128px 120px,276.5px 187px,
          150px 31px,153px 31px,301.5px 120.5px,
          175px 235px,178px 235px,326.5px 384.5px,
          200px 121px,203px 121px,351.5px 228.5px,
          225px 224px,228px 224px,376.5px 364.5px,
          250px 26px,253px 26px,401.5px 105px,
          275px 75px,278px 75px,426.5px 180px;
      }
      to {
        background-position:
          0px 6800px,3px 6800px,151.5px 6917.5px,
          25px 13632px,28px 13632px,176.5px 13758px,
          50px 5416px,53px 5416px,201.5px 5491px,
          75px 17175px,78px 17175px,226.5px 17301.5px,
          100px 5119px,103px 5119px,251.5px 5221px,
          125px 8428px,128px 8428px,276.5px 8495px,
          150px 9876px,153px 9876px,301.5px 9965.5px,
          175px 13391px,178px 13391px,326.5px 13540.5px,
          200px 14741px,203px 14741px,351.5px 14848.5px,
          225px 18770px,228px 18770px,376.5px 18910.5px,
          250px 5082px,253px 5082px,401.5px 5161px,
          275px 6375px,278px 6375px,426.5px 6480px;
      }
    }
    .falling-anim {
      animation: fallingPatternAnim 150s linear infinite;
      position: absolute; inset: 0;
    }

    @media (prefers-reduced-motion: reduce) {
      #root { scroll-behavior: auto; }
      .snap-section, .snap-strict {
        opacity: 1 !important;
        transform: none !important;
        transition: none !important;
      }
      .falling-anim { animation: none !important; }
      .anim-bounce { animation: none !important; }
      .anim-fadeup, .anim-fadein, .anim-delay-1, .anim-delay-2, .anim-delay-3, .anim-delay-4 {
        animation: none !important;
        opacity: 1 !important;
      }
      .modal-card { animation: none !important; }
      .fp-drift { animation: none !important; transform: translate3d(0, 0, 0) rotate(var(--fp-rot, 0deg)) !important; }
    }
  </style>
</head>
<body>
<div id="root"></div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.bundle.js" defer></script>


<script>
  (function() {
    function initSectionObserver() {
      const rootEl   = document.getElementById('root');
      const sections = document.querySelectorAll('.snap-section, .snap-strict');
      if (!sections.length) { setTimeout(initSectionObserver, 150); return; }

      // Stagger delays so each section has a unique entrance feel
      const delays = [0, 0, 40, 30, 20, 10];
      sections.forEach((s, i) => {
        s.style.transitionDelay = (delays[i] || 0) + 'ms';
      });

      const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) entry.target.classList.add('in-view');
        });
      }, {
        threshold: 0,
        rootMargin: '10% 0px 10% 0px',
        root: rootEl,
      });

      sections.forEach(s => obs.observe(s));
    }
    initSectionObserver();
  })();
</script>
</body>
</html>
